<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KRIVEN</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <style>
    body { margin: 0; background: #080808; color: #f2f2f2; font-family: system-ui, -apple-system, sans-serif; }
    .boot-screen { padding: 8px 0 16px; }
    .boot-title { font-size: 1.35rem; font-weight: 700; margin-bottom: 6px; }
    .boot-sub { color: #888; margin-bottom: 14px; }
    .boot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .boot-btn {
      min-height: 120px; border-radius: 14px; border: 1px solid rgba(255,255,255,.09);
      background: #141414; color: #f2f2f2; font: inherit; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    }
    .boot-icon { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; color: #e0e0e0; }
    .choice-icon { width: 40px; height: 40px; display: block; }
    .boot-label { font-weight: 600; }
  </style>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css?v=7" />
  <link rel="preload" href="icons.js?v=1" as="script" />
  <link rel="preload" href="catalog.js?v=6" as="script" />
  <link rel="preload" href="app.js?v=8" as="script" />
</head>
<body>
  <div class="glow"></div>
  <div class="app">
    <header class="header">
      <div class="logo-mark">◈</div>
      <h1 class="logo-text">KRIVEN</h1>
      <p class="tagline">BARBERS</p>
    </header>

    <div class="progress" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <main id="screen">
      <div class="boot-screen" id="bootScreen">
        <div class="boot-title">Запись</div>
        <p class="boot-sub">Что тебе нужно?</p>
        <div class="boot-grid">
          <button type="button" class="boot-btn" data-type="haircut">
            <span class="boot-icon"><svg class="choice-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="15" cy="11" r="4.5" stroke="currentColor" stroke-width="1.75"/><circle cx="33" cy="11" r="4.5" stroke="currentColor" stroke-width="1.75"/><path d="M18.5 14.5L24 23L29.5 14.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><path d="M21.5 23L18 39" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M26.5 23L30 39" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M17 39H31" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg></span>
            <span class="boot-label">Стрижка</span>
          </button>
          <button type="button" class="boot-btn" data-type="beard">
            <span class="boot-icon"><svg class="choice-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M24 10C17.5 10 13 15 13 21.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M24 10C30.5 10 35 15 35 21.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M13 21.5C13 29 17 36.5 24 38.5C31 36.5 35 29 35 21.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><path d="M17 22.5C19 24.5 21.5 25 24 24C26.5 25 29 24.5 31 22.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 28C21.5 32 22.5 34 24 34.5C25.5 34 26.5 32 28 28" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/></svg></span>
            <span class="boot-label">Борода</span>
          </button>
        </div>
      </div>
    </main>

    <nav class="tabs" id="tabs">
      <button type="button" class="tab active" data-tab="book">Записаться</button>
      <button type="button" class="tab" data-tab="bookings">Мои записи</button>
    </nav>
  </div>

  <script src="icons.js?v=1"></script>
  <script src="catalog.js?v=6"></script>
  <script src="app.js?v=8" defer></script>
</body>
</html>
