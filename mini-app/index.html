<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KRIVEN BARBERS</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="chrome-glow"></div>
  <div class="app">
    <header class="header">
      <div class="logo">◈ KRIVEN</div>
      <div class="subtitle">BARBERS</div>
    </header>

    <div id="salesBanner" class="sales-banner hidden"></div>

    <div class="progress">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="steps" id="stepLabels">
      <span class="active">1</span>
      <span>2</span>
      <span>3</span>
      <span>4</span>
      <span>5</span>
    </div>

    <main id="screen"></main>

    <nav class="tabs" id="tabs">
      <button type="button" class="tab active" data-tab="book">Записаться</button>
      <button type="button" class="tab" data-tab="bookings">Мои записи</button>
    </nav>
  </div>

  <script src="catalog.js"></script>
  <script src="app.js"></script>
</body>
</html>
