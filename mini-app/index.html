<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KRIVEN</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <style>
    body { margin: 0; background: #080808; color: #f2f2f2; font-family: system-ui, -apple-system, sans-serif; }
    .boot-screen { padding: 8px 0 16px; }
    .boot-title { font-size: 1.35rem; font-weight: 700; margin-bottom: 6px; }
    .boot-sub { color: #888; margin-bottom: 14px; }
    .boot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .boot-btn {
      min-height: 120px; border-radius: 14px; border: 1px solid rgba(255,255,255,.09);
      background: #141414; color: #f2f2f2; font: inherit; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    }
    .boot-icon { font-size: 2rem; }
    .boot-label { font-weight: 600; }
  </style>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css?v=6" />
  <link rel="preload" href="catalog.js?v=6" as="script" />
  <link rel="preload" href="app.js?v=7" as="script" />
</head>
<body>
  <div class="glow"></div>
  <div class="app">
    <header class="header">
      <div class="logo-mark">◈</div>
      <h1 class="logo-text">KRIVEN</h1>
      <p class="tagline">BARBERS</p>
    </header>

    <div class="progress" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <main id="screen">
      <div class="boot-screen" id="bootScreen">
        <div class="boot-title">Запись</div>
        <p class="boot-sub">Что тебе нужно?</p>
        <div class="boot-grid">
          <button type="button" class="boot-btn" data-type="haircut">
            <span class="boot-icon">✂️</span>
            <span class="boot-label">Стрижка</span>
          </button>
          <button type="button" class="boot-btn" data-type="beard">
            <span class="boot-icon">🧔</span>
            <span class="boot-label">Борода</span>
          </button>
        </div>
      </div>
    </main>

    <nav class="tabs" id="tabs">
      <button type="button" class="tab active" data-tab="book">Записаться</button>
      <button type="button" class="tab" data-tab="bookings">Мои записи</button>
    </nav>
  </div>

  <script src="catalog.js?v=6"></script>
  <script src="app.js?v=7" defer></script>
</body>
</html>
