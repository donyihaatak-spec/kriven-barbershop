<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KRIVEN Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/assets/style.css?v=3" />
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="logo">◈ KRIVEN</div>
      <div class="subtitle">ADMIN</div>
      <p class="hint">Вход для владельца барбершопа</p>
      <input type="password" id="passwordInput" placeholder="Пароль" autocomplete="current-password" />
      <button type="button" id="loginBtn">Войти</button>
      <p class="error" id="loginError"></p>
    </div>
  </div>

  <div id="adminLayout" class="admin-layout hidden">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Меню">☰</button>
        <div>
          <div class="logo-sm">KRIVEN</div>
          <div class="subtitle-sm">Admin</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">Главное</div>
        <button type="button" class="nav-item" data-page="dashboard">
          <span class="nav-icon">▦</span><span class="nav-label">Панель управления</span>
        </button>
        <button type="button" class="nav-item active" data-page="bookings">
          <span class="nav-icon">📅</span><span class="nav-label">Бронирования</span>
        </button>
        <button type="button" class="nav-item" data-page="clients">
          <span class="nav-icon">👤</span><span class="nav-label">Клиенты</span>
        </button>
        <button type="button" class="nav-item" data-page="services">
          <span class="nav-icon">✂️</span><span class="nav-label">Услуги</span>
        </button>
        <button type="button" class="nav-item" data-page="barbers">
          <span class="nav-icon">🧔</span><span class="nav-label">Барберы</span>
        </button>

        <div class="nav-section">Управление</div>
        <button type="button" class="nav-item" data-page="reviews">
          <span class="nav-icon">⭐</span><span class="nav-label">Отзывы</span>
        </button>
        <button type="button" class="nav-item" data-page="gallery">
          <span class="nav-icon">🖼</span><span class="nav-label">Галерея</span>
        </button>
        <button type="button" class="nav-item" data-page="settings">
          <span class="nav-icon">⚙</span><span class="nav-label">Настройки</span>
        </button>
        <button type="button" class="nav-item" data-page="users">
          <span class="nav-icon">👥</span><span class="nav-label">Пользователи</span>
        </button>

        <div class="nav-section">Система</div>
        <button type="button" class="nav-item" data-page="logs">
          <span class="nav-icon">📋</span><span class="nav-label">Логи</span>
        </button>
        <button type="button" class="nav-item nav-logout" id="logoutBtn">
          <span class="nav-icon">⎋</span><span class="nav-label">Выход</span>
        </button>
      </nav>

      <div class="sidebar-footer">KRIVEN Admin © 2026</div>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <div class="topbar-spacer"></div>
        <button type="button" class="topbar-btn notify-btn" title="Уведомления">
          🔔
          <span class="notify-badge" id="notifyBadge">0</span>
        </button>
        <div class="user-menu">
          <div class="user-avatar">K</div>
          <span class="user-name">kriven_admin</span>
          <span class="user-caret">▾</span>
        </div>
      </header>

      <main class="content" id="appScreen">
        <div class="page-head">
          <div>
            <h1 class="page-title">Бронирования</h1>
            <div class="breadcrumb">Главная / Бронирования</div>
          </div>
        </div>

        <div class="stats-row" id="stats"></div>

        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">Список бронирований</h2>
            <select class="status-select" id="statusFilter">
              <option value="pending">Ждут оплату</option>
              <option value="today">Сегодня</option>
              <option value="upcoming">Предстоящие</option>
              <option value="all">Все статусы</option>
            </select>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Клиент</th>
                  <th>Контакт</th>
                  <th>Услуга</th>
                  <th>Барбер</th>
                  <th>Дата и время</th>
                  <th>Статус</th>
                  <th>Действия</th>
                </tr>
              </thead>
              <tbody id="bookings"></tbody>
            </table>
          </div>
          <div class="table-footer" id="tableFooter"></div>
        </div>
      </main>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>
  <script src="/admin/assets/app.js?v=3"></script>
</body>
</html>
