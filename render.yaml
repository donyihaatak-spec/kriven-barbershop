services:
  - type: web
    name: kriven-barbershop
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: PREPAY_PHONE
        sync: false
      - key: PREPAY_NAME
        value: KRIVEN BARBERS
      - key: ADMIN_PASSWORD
        sync: false
      - key: SALES_MODE
        value: "true"
      - key: SALES_CONTACT_URL
        value: https://t.me/bonnement
      - key: KWORK_URL
        value: https://kwork.ru/user/bonnement
